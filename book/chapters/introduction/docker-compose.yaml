name: "cfbook-chapter"

services:

  # http://localhost:8080 - provides a runtime for your code samples.
  code:
    build:
      context: "./code/docker/"
      dockerfile: "Dockerfile"
    ports:
      - "8080:8080"
    volumes:
      - "./code/app:/app"
    healthcheck:
      test: [ "CMD", "curl", "-fsS", "http://localhost:8080/CFIDE/administrator/index.cfm" ]
      interval: "3s"
      timeout: "3s"
      retries: 10
      start_period: "30s"

  # http://localhost - provides a preview of your chapter content.
  preview:
    build:
      context: "../../preview/docker/"
      dockerfile: "Dockerfile"
    ports:
      - "80:8080"
      - "443:8443"
    volumes:
      # So we know which chapter is being previewed.
      - "./metadata.json:/metadata.json"
      # So we have access to all chapter and author data.
      - "../../authors:/authors"
      - "../../chapters:/chapters"
      # So we have access to the preview application.
      - "../../preview/app:/app"
    # Probe the ColdFusion Admin page instead of "/" so the health check doesn't execute
    # application code on every request (on preview, "/" triggers a full chapter render).
    # Requires `blockCFAdmin: false` in server.json — locking down admin breaks this probe.
    healthcheck:
      test: [ "CMD", "curl", "-fsS", "http://localhost:8080/CFIDE/administrator/index.cfm" ]
      interval: "3s"
      timeout: "3s"
      retries: 10
      start_period: "30s"
